# Deploy Viable branch to GitHub Pages
name: Deploy Viable-Keybard

on:
  push:
    branches:
      - viable-protocol-migration
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/viable-deploy.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "viable-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture build metadata
        id: meta
        run: |
          {
            echo "branch=${{ github.ref_name }}"
            echo "sha=$(echo '${{ github.sha }}' | cut -c1-7)"
            echo "subject<<GHA_EOF"
            git log -1 --pretty=%s
            echo "GHA_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Vite app
        env:
          GIT_BRANCH: ${{ steps.meta.outputs.branch }}
          GIT_SHA: ${{ steps.meta.outputs.sha }}
          GIT_SUBJECT: ${{ steps.meta.outputs.subject }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
